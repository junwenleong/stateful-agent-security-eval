---
# Mac Studio Part 1: All 19 Ollama models, n=3 pilot
# 2 attacks × 5 defenses × 19 models × 3 runs = 570 runs
# M3 Ultra 96GB RAM — optimised for size-tiered parallelism
#
# Ollama config recommended:
#   OLLAMA_HOST=0.0.0.0:11434
#   OLLAMA_CONTEXT_LENGTH=32768
#   OLLAMA_NUM_PARALLEL=4        (reduced from 6 — large models need headroom)
#   OLLAMA_MAX_LOADED_MODELS=2   (keep 2 models hot)
#   OLLAMA_FLASH_ATTENTION=1
#
# Run with: .venv/bin/python scripts/run_mac_studio_part1.py --workers 8
#
# Model tiers by RAM:
#   Small  (≤10GB):  max_concurrent=2 — 2 can fit simultaneously
#   Medium (15-32GB): max_concurrent=1 — one at a time
#   Large  (39-65GB): max_concurrent=1 — one at a time, needs full RAM

runs_per_condition: 3
results_path: results/mac_studio_part1/results.jsonl
db_base_dir: data/runs

# ── Models ────────────────────────────────────────────────────────────────────
# Ordered small→large so the scheduler fills small-model slots first.
# max_concurrent=2 for small models: Ollama can keep 2 loaded simultaneously.
# max_concurrent=1 for medium/large: avoid model-swap thrashing.
models:
  # ── Small tier (≤10GB) — max_concurrent=2 ──────────────────────────────────
  - provider: ollama
    model_name: nemotron-3-nano:4b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: llama3-groq-tool-use:8b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: llama3.1:8b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: qwen3:8b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: rnj-1:8b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: ministral-3:8b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: qwen3.5:9b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: cogito:14b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  - provider: ollama
    model_name: qwen2.5:14b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 2
      rpm_limit: 999

  # ── Medium tier (15-32GB) — max_concurrent=1 ───────────────────────────────
  - provider: ollama
    model_name: mistral-small3.2:24b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 1
      rpm_limit: 999

  - provider: ollama
    model_name: nemotron-3-nano:30b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 1
      rpm_limit: 999

  - provider: ollama
