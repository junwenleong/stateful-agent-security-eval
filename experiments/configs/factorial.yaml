  - condition_a: "attack=delayed_trigger,defense=no_defense,model=ministral-3:8b"
    condition_b: "attack=delayed_trigger,defense=prompt_hardening,model=ministral-3:8b"
  - condition_a: "attack=delayed_trigger,defense=no_defense,model=ministral-3:8b"
    condition_b: "attack=delayed_trigger,defense=rag_sanitizer,model=ministral-3:8b"
  - condition_a: "attack=delayed_trigger,defense=minimizer_only,model=ministral-3:8b"
    condition_b: "attack=delayed_trigger,defense=sanitizer_only,model=ministral-3:8b"

  # delayed_trigger × rnj-1:8b
  - condition_a: "attack=delayed_trigger,defense=no_defense,model=rnj-1:8b"
    condition_b: "attack=delayed_trigger,defense=minimizer_only,model=rnj-1:8b"
