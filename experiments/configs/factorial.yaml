    condition_b: "attack=no_attack,defense=minimizer_only,model=rnj-1:8b"
  - condition_a: "attack=no_attack,defense=no_defense,model=rnj-1:8b"
    condition_b: "attack=no_attack,defense=sanitizer_only,model=rnj-1:8b"
  - condition_a: "attack=no_attack,defense=no_defense,model=rnj-1:8b"
    condition_b: "attack=no_attack,defense=prompt_hardening,model=rnj-1:8b"
  - condition_a: "attack=no_attack,defense=no_defense,model=rnj-1:8b"
    condition_b: "attack=no_attack,defense=rag_sanitizer,model=rnj-1:8b"

  # delayed_trigger × qwen3:8b
  - condition_a: "attack=delayed_trigger,defense=no_defense,model=qwen3:8b"
    condition_b: "attack=delayed_trigger,defense=minimizer_only,model=qwen3:8b"
  - condition_a: "attack=delayed_trigger,defense=no_defense,model=qwen3:8b"
    condition_b: "attack=delayed_trigger,defense=sanitizer_only,model=qwen3:8b"
  - condition_a: "attack=delayed_trigger,defense=no_defense,model=qwen3:8b"
    condition_b: "attack=delayed_trigger,defense=prompt_hardening,model=qwen3:8b"
  - condition_a: "attack=delayed_trigger,defense=no_defense,model=qwen3:8b"
    condition_b: "attack=delayed_trigger,defense=rag_sanitizer,model=qwen3:8b"
  - condition_a: "attack=delayed_trigger,defense=minimizer_only,model=qwen3:8b"
