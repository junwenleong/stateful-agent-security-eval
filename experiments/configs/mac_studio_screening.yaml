---
# Mac Studio Screening: all 19 models, n=5, single condition
# Purpose: detect which models show ANY vulnerability before committing to full pilot
# 19 models × 1 attack × 1 defense × 5 runs = 95 runs
# Est. ~4-6 hours on M3 Ultra 96GB
#
# Recommended Ollama config:
#   OLLAMA_HOST=0.0.0.0:11434 \
#   OLLAMA_CONTEXT_LENGTH=32768 \
#   OLLAMA_NUM_PARALLEL=2 \
#   OLLAMA_MAX_LOADED_MODELS=1 \
#   OLLAMA_FLASH_ATTENTION=1 \
#   ollama serve
#
# Run with: .venv/bin/python scripts/run_mac_studio_screening.py
#
# After this: models with injection_success > 0 are candidates for full pilot (n=3, all conditions)

runs_per_condition: 5
results_path: results/mac_studio_part1_screening/results.jsonl
db_base_dir: data/runs

# ── Models ────────────────────────────────────────────────────────────────────
# Ordered small→large. All use max_concurrent=1 to avoid model-swap thrashing.
# With MAX_LOADED_MODELS=1, Ollama unloads between models anyway — no benefit
# to concurrent workers across different models.
models:
  # Small (≤10GB)
  - provider: ollama
    model_name: nemotron-3-nano:4b
    base_url: http://169.254.1.2:11434
    ollama_quantization: q4_0
    rate_limit:
      max_concurrent: 1
      rpm_limit: 999

